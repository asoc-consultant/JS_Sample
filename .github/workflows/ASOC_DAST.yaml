name: "HCL AppScan DAST - basic"
on:
  workflow_dispatch
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ASoC DAST Scan
        uses: HCL-TECH-SOFTWARE/appscan-dast-action@v1.0.6
        with:
          baseurl:  https://cloud.appscan.com
          # API key for connecting to ASoC.
          asoc_key: ${{secrets.ASOC_CONSULTANT_KEY}}
          # Secret for connecting to ASoC.
          asoc_secret: ${{secrets.ASOC_CONSULTANT_SECRET}}
          # The ASoC application id where your scan will appear.
          application_id: 'a354e870-1749-4d43-b1c8-f96fc9a138a3'
          dynamic_scan_type: dast
          starting_URL: 'https://demo.testfire.net'
          login_method: userpass
          login_user: jsmith
          login_password: demo1234
          network: public
          fail_for_noncompliance: false
          wait_for_analysis: true
      - uses: actions/upload-artifact@v4
        name: Upload HCL AppScan HTML Report to Github Artifacts
        with:
          name: AppScan Security Scan HTML Report 
          path: '**/AppScan*.html'
        if: success() || failure()          
